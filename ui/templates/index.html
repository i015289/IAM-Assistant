<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IAM Assistant</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@15.0.12/marked.min.js" integrity="sha384-948ahk4ZmxYVYOc+rxN1H2gM1EJ2Duhp7uHtZ4WSLkV4Vtx5MUqnV+l7u9B+jFv+" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.4/dist/purify.min.js" integrity="sha384-eEu5CTj3qGvu9PdJuS+YlkNi7d2XxQROAFYOr59zgObtlcux1ae1Il3u7jvdCSWu" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header id="header">
  <span class="logo">⚡ IAM Assistant</span>
  <div class="header-right">
    <span id="mcp-indicator" class="indicator {{ 'connected' if mcp_status == 'connected' else 'disconnected' }}">
      ● ER6 {{ mcp_status }}
    </span>
    <span class="username">{{ username }}</span>
    <a href="/auth/logout" class="signout">Sign out</a>
  </div>
</header>

<div id="layout">

  <!-- Chat panel (full viewport) -->
  <div id="chat-panel">
    <div id="welcome" class="welcome">
      <h2>IAM Assistant</h2>
      <p>Ask a question to get started. Examples:</p>
      <ul>
        <li>Show BRT coverage for SAP_BR_TREASURY_SPECIALIST_FOE</li>
        <li>Run a SoD scan on the Treasury FOE catalogs</li>
        <li>Check restriction type coverage for SAP_FIN_BC_TRM_TMPL_PC</li>
      </ul>
    </div>
    <div id="messages"></div>
    <div id="input-bar">
      <textarea
        id="input"
        placeholder="Ask about roles, catalogs, SoD…"
        rows="1"
      ></textarea>
      <button id="send-btn" onclick="sendMessage()">Send</button>
    </div>
  </div>

</div>

<script src="/static/app.js"></script>
</body>
</html>
