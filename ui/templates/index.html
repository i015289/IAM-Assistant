<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IAM Assistant</title>
  <script src="/static/vendor/marked-15.0.12.min.js"></script>
  <script src="/static/vendor/dompurify-3.2.4.min.js"></script>
  <script>
    // Set theme before stylesheet loads — prevents flash of wrong theme.
    (function () {
      var t = null;
      try { t = localStorage.getItem("theme"); } catch (e) {}
      document.documentElement.setAttribute("data-theme", t === "dark" ? "dark" : "light");
    })();
  </script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header id="header">
  <div class="header-left">
    <span class="logo">⚡ IAM Assistant</span>
    <button id="theme-toggle" type="button" title="Toggle theme" aria-label="Toggle theme">☀ Light</button>
  </div>
  <div class="header-right">
    <span id="mcp-indicator" class="indicator {{ 'connected' if mcp_status == 'connected' else 'disconnected' }}">
      ● ER6 {{ mcp_status }}
    </span>
    <span class="indicator">Model: {{ llm_model }}</span>
    <span class="username">{{ username }}</span>
    <a href="/auth/logout" class="signout">Sign out</a>
  </div>
</header>

<!-- Welcome content (cloned at startup-when-empty and on New session).
     #welcome-templates is filled at clone time by populateWelcomeTemplates(). -->
<template id="welcome-template">
  <div id="welcome">
    <div class="welcome">
      <h2>IAM Assistant</h2>
      <p>Pick a template to start, or type your own question.</p>
      <div id="welcome-templates"></div>
    </div>
  </div>
</template>

<div id="layout">

  <!-- Left: sessions sidebar -->
  <aside id="sidebar">
    <button id="sidebar-new-btn" type="button">+ New</button>
    <div id="sidebar-search-wrap">
      <input id="sidebar-search" type="text" placeholder="Search sessions…" autocomplete="off" />
      <button id="sidebar-search-clear" type="button" title="Clear" hidden>×</button>
    </div>
    <div id="session-list"></div>
  </aside>

  <!-- Right: chat panel -->
  <div id="chat-panel">
    <div id="messages"></div>
    <div id="input-bar">
      <textarea
        id="input"
        placeholder="Ask about roles, catalogs, SoD…"
        rows="1"
      ></textarea>
      <button id="send-btn" onclick="sendMessage()">Send</button>
    </div>
  </div>

</div>

<script src="/static/prompt-templates.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
