<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IAM Assistant</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@15.0.12/marked.min.js" integrity="sha384-948ahk4ZmxYVYOc+rxN1H2gM1EJ2Duhp7uHtZ4WSLkV4Vtx5MUqnV+l7u9B+jFv+" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.4/dist/purify.min.js" integrity="sha384-eEu5CTj3qGvu9PdJuS+YlkNi7d2XxQROAFYOr59zgObtlcux1ae1Il3u7jvdCSWu" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header id="header">
  <span class="logo">⚡ IAM Assistant</span>
  <div class="header-right">
    <span id="mcp-indicator" class="indicator {{ 'connected' if mcp_status == 'connected' else 'disconnected' }}">
      ● ER6 {{ mcp_status }}
    </span>
    <span class="username">{{ username }}</span>
    <a href="/auth/logout" class="signout">Sign out</a>
  </div>
</header>

<!-- Welcome content (cloned at startup-when-empty and on New session).
     #welcome-templates is filled at clone time by populateWelcomeTemplates(). -->
<template id="welcome-template">
  <div id="welcome">
    <div class="welcome">
      <h2>IAM Assistant</h2>
      <p>Pick a template to start, or type your own question.</p>
      <div id="welcome-templates"></div>
    </div>
  </div>
</template>

<div id="layout">

  <!-- Left: sessions sidebar -->
  <aside id="sidebar">
    <button id="sidebar-new-btn" type="button">+ New</button>
    <div id="sidebar-search-wrap">
      <input id="sidebar-search" type="text" placeholder="Search sessions…" autocomplete="off" />
      <button id="sidebar-search-clear" type="button" title="Clear" hidden>×</button>
    </div>
    <div id="session-list"></div>
  </aside>

  <!-- Right: chat panel -->
  <div id="chat-panel">
    <div id="messages"></div>
    <div id="input-bar">
      <textarea
        id="input"
        placeholder="Ask about roles, catalogs, SoD…"
        rows="1"
      ></textarea>
      <button id="send-btn" onclick="sendMessage()">Send</button>
    </div>
  </div>

</div>

<script src="/static/prompt-templates.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
